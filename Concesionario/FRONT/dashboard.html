<!-- dashboard.html -->
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Concesionario de Motos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="wrapper">
        <!-- Sidebar -->
        <nav id="sidebar" class="bg-dark">
            <div class="sidebar-header p-3">
                <h4><i class="fas fa-motorcycle"></i> MotoCon</h4>
                <small class="text-muted">Concesionario Colombia</small>
            </div>

            <ul class="list-unstyled components p-3">
                <li class="nav-item" data-module="dashboard">
                    <a href="#" class="nav-link active">
                        <i class="fas fa-tachometer-alt"></i> Dashboard
                    </a>
                </li>
                
                <li class="nav-item" data-module="ventas">
                    <a href="#" class="nav-link">
                        <i class="fas fa-shopping-cart"></i> Ventas
                    </a>
                </li>
                
                <li class="nav-item" data-module="inventario">
                    <a href="#" class="nav-link">
                        <i class="fas fa-boxes"></i> Inventario
                    </a>
                </li>
                
                <li class="nav-item" data-module="clientes">
                    <a href="#" class="nav-link">
                        <i class="fas fa-users"></i> Clientes
                    </a>
                </li>
                
                <li class="nav-item" data-module="motos">
                    <a href="#" class="nav-link">
                        <i class="fas fa-motorcycle"></i> Motos
                    </a>
                </li>
                
                <li class="nav-item" data-module="empleados" style="display: none;">
                    <a href="#" class="nav-link">
                        <i class="fas fa-user-tie"></i> Empleados
                    </a>
                </li>
                
                <li class="nav-item" data-module="usuarios" style="display: none;">
                    <a href="#" class="nav-link">
                        <i class="fas fa-user-shield"></i> Usuarios
                    </a>
                </li>
                
                <li class="nav-item" data-module="reportes">
                    <a href="#" class="nav-link">
                        <i class="fas fa-chart-bar"></i> Reportes
                    </a>
                </li>
                
                <li class="nav-item" data-module="consultas">
                    <a href="#" class="nav-link">
                        <i class="fas fa-database"></i> Consultas SQL
                    </a>
                </li>
            </ul>

            <div class="sidebar-footer p-3">
                <div class="user-info">
                    <i class="fas fa-user-circle"></i>
                    <span id="userName"></span>
                    <small class="d-block text-muted" id="userRole"></small>
                </div>
                <button id="logoutBtn" class="btn btn-danger btn-sm w-100 mt-2">
                    <i class="fas fa-sign-out-alt"></i> Cerrar Sesión
                </button>
            </div>
        </nav>

        <!-- Page Content -->
        <div id="content">
            <nav class="navbar navbar-expand-lg navbar-light bg-light">
                <div class="container-fluid">
                    <button type="button" id="sidebarCollapse" class="btn btn-dark">
                        <i class="fas fa-bars"></i>
                    </button>
                    <div class="ms-auto">
                        <span class="badge bg-primary" id="currentDateTime"></span>
                    </div>
                </div>
            </nav>

            <div class="container-fluid mt-3">
                <div id="mainContent">
                    <!-- Content loaded dynamically -->
                    <div class="row">
                        <div class="col-12">
                            <div class="card">
                                <div class="card-body text-center">
                                    <h3>Bienvenido al Sistema</h3>
                                    <p>Seleccione una opción del menú lateral</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modals -->
    <div class="modal fade" id="genericModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Modal Title</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    Modal content
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.datatables.net/1.11.5/js/jquery.dataTables.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
    <script src="js/modules/ventas.js"></script>
    <script src="js/modules/inventario.js"></script>
    <script src="js/modules/clientes.js"></script>
    <script src="js/modules/motos.js"></script>
    <script src="js/modules/empleados.js"></script>
    <script src="js/modules/usuarios.js"></script>
    <script src="js/modules/reportes.js"></script>
    <script src="js/modules/consultas.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
